services:
  api:
    build:
      context: ../opensoar-core
      target: api
    command: ["uvicorn", "opensoar.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ../opensoar-core/src:/app/src
      - ../opensoar-core/playbooks:/app/playbooks

  worker:
    build:
      context: ../opensoar-core
      target: worker
    volumes:
      - ../opensoar-core/src:/app/src
      - ../opensoar-core/playbooks:/app/playbooks

  ui:
    build:
      context: ../opensoar-ui
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    volumes:
      - ../opensoar-ui/src:/app/src
    ports:
      - "3000:5173"
